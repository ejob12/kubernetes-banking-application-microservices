apiVersion: v1
kind: Namespace
metadata:
  name: liontech-finance
---
apiVersion: v1
kind: Secret
metadata:
  name: liontech-finance-secrets
  namespace: liontech-finance
type: Opaque
stringData:
  AUTH_SECRET: change-this-liontech-finance-auth-secret
  SERVICE_TOKEN: change-this-liontech-finance-service-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: liontech-finance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/liontechdevopsstudents/liontech-finance-frontend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: liontech-finance
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: liontech-finance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: docker.io/liontechdevopsstudents/liontech-finance-gateway:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: liontech-finance-secrets
          env:
            - name: PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3000
            - name: PROFILE_SERVICE_URL
              value: http://profile-service:3000
            - name: ACCOUNTS_SERVICE_URL
              value: http://accounts-service:3000
            - name: BALANCER_SERVICE_URL
              value: http://balancer-service:3000
            - name: NOTIFICATIONS_SERVICE_URL
              value: http://notifications-service:3000
            - name: DEPOSITS_SERVICE_URL
              value: http://deposits-service:3000
            - name: TRANSFERS_SERVICE_URL
              value: http://transfers-service:3000
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:3000
            - name: AI_SERVICE_URL
              value: http://ai-service:3000
            - name: ADMIN_SERVICE_URL
              value: http://admin-service:3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: liontech-finance
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: liontech-finance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: docker.io/liontechdevopsstudents/liontech-finance-auth:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: liontech-finance-secrets
          env:
            - name: PORT
              value: "3000"
            - name: DATA_FILE
              value: /data/auth.json
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: liontech-finance
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
      targetPort: 3000
